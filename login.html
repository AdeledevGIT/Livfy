<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Livfy AI Studio</title>
  <meta name="description" content="Login to your Livfy AI Studio account" />
  <link rel="icon" type="image/png" href="image/webicon.png" />
  <link rel="apple-touch-icon" href="image/webicon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#05051a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    
    window.firebaseApp = initializeApp;
    window.firebaseAuth = getAuth;
    window.signInWithEmailAndPassword = signInWithEmailAndPassword;
    window.signInWithPopup = signInWithPopup;
    window.GoogleAuthProvider = GoogleAuthProvider;
    window.onAuthStateChanged = onAuthStateChanged;
  </script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#05051a;
      --card:rgba(255,255,255,.04);
      --border:rgba(255,255,255,.08);
      --border-h:rgba(255,255,255,.14);
      --txt:#f0f4ff;
      --txt2:rgba(240,244,255,.62);
      --txt3:rgba(240,244,255,.38);
      --pink:#ff2d6f;
      --violet:#c084fc;
      --cyan:#00c8ff;
      --accent:var(--pink);
      --accent2:var(--violet);
      --green:#10b981; --amber:#f59e0b; --red:#ef4444;
      --grad:linear-gradient(135deg,#ff2d6f,#c084fc 50%,#00c8ff);
      --grad-soft:linear-gradient(135deg,rgba(255,45,111,.12),rgba(0,200,255,.08));
    }
    html, body { height:100%; }
    body {
      font-family:'Inter',system-ui,sans-serif;
      background:var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 15% 0%,rgba(255,45,111,.07) 0,transparent 60%),
        radial-gradient(ellipse 60% 45% at 85% 95%,rgba(0,200,255,.05) 0,transparent 60%);
      color:var(--txt);
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
      display:flex;
      flex-direction:column;
    }

    /* ── HEADER ──────────────────────────────────────── */
    .hdr {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 28px;
      height:80px;
      background:rgba(5,5,26,.92); backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:300;
    }
    .hdr::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,45,111,.35),rgba(0,200,255,.35),transparent);
      pointer-events:none;
    }
    .logo { display:flex; align-items:center; text-decoration:none; }
    .logo-img { height:68px; width:auto; object-fit:contain; display:block; }
    .nav { display:flex; align-items:center; gap:4px; }
    .nav a {
      display:flex; align-items:center; gap:6px;
      padding:6px 14px; border-radius:8px;
      text-decoration:none; font-size:13px; font-weight:600;
      color:var(--txt2); transition:all .2s;
    }
    .nav a:hover { background:rgba(255,255,255,.06); color:var(--txt); }
    .nav a.active {
      background:rgba(255,45,111,.1); border:1px solid rgba(255,45,111,.28);
      color:var(--pink);
    }
    .hdr-right { display:flex; align-items:center; gap:10px; }

    /* ── AUTH CONTAINER ─────────────────────────────── */
    .auth-container {
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px;
    }
    .auth-card {
      width:100%;
      max-width:420px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:20px;
      padding:40px;
      backdrop-filter:blur(12px);
    }
    .auth-header {
      text-align:center;
      margin-bottom:32px;
    }
    .auth-title {
      font-size:28px;
      font-weight:800;
      letter-spacing:-.02em;
      margin-bottom:8px;
    }
    .auth-sub {
      font-size:14px;
      color:var(--txt2);
    }
    .auth-sub a {
      color:var(--accent);
      text-decoration:none;
      font-weight:600;
    }
    .auth-sub a:hover {
      text-decoration:underline;
    }

    /* ── FORM ───────────────────────────────────────── */
    .form-group {
      margin-bottom:20px;
    }
    .form-label {
      display:block;
      font-size:12px;
      font-weight:600;
      color:var(--txt2);
      margin-bottom:8px;
      letter-spacing:.04em;
      text-transform:uppercase;
    }
    .form-input {
      width:100%;
      padding:12px 16px;
      border-radius:10px;
      border:1px solid var(--border-h);
      background:rgba(6,8,16,.7);
      color:var(--txt);
      font-size:14px;
      font-family:inherit;
      transition:border-color .2s, box-shadow .2s;
    }
    .form-input:focus {
      outline:none;
      border-color:rgba(255,45,111,.45);
      box-shadow:0 0 0 3px rgba(255,45,111,.1);
    }
    .form-input::placeholder {
      color:var(--txt3);
    }
    .form-input.error {
      border-color:var(--red);
    }
    .error-msg {
      font-size:12px;
      color:var(--red);
      margin-top:6px;
      display:none;
    }
    .error-msg.show {
      display:block;
    }

    .form-options {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:24px;
      font-size:13px;
    }
    .remember {
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--txt2);
      cursor:pointer;
    }
    .remember input {
      width:16px;
      height:16px;
      accent-color:var(--accent);
    }
    .forgot-link {
      color:var(--accent);
      text-decoration:none;
      font-weight:600;
    }
    .forgot-link:hover {
      text-decoration:underline;
    }

    .submit-btn {
      width:100%;
      padding:14px;
      border-radius:12px;
      border:none;
      background:var(--grad);
      color:#fff;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      transition:all .25s;
      font-family:inherit;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      box-shadow:0 4px 20px rgba(255,45,111,.3);
    }
    .submit-btn:hover {
      transform:translateY(-2px);
      box-shadow:0 6px 28px rgba(255,45,111,.4);
    }
    .submit-btn:active {
      transform:translateY(0);
    }
    .submit-btn:disabled {
      opacity:.5;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    .divider {
      display:flex;
      align-items:center;
      gap:16px;
      margin:28px 0;
      color:var(--txt3);
      font-size:13px;
    }
    .divider::before,
    .divider::after {
      content:'';
      flex:1;
      height:1px;
      background:var(--border);
    }

    .social-btn {
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid var(--border-h);
      background:rgba(255,255,255,.04);
      color:var(--txt);
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      transition:all .2s;
      font-family:inherit;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-bottom:12px;
    }
    .social-btn:hover {
      background:rgba(255,255,255,.08);
      border-color:rgba(255,255,255,.2);
    }
    .social-btn:last-child {
      margin-bottom:0;
    }

    /* ── ALERT ──────────────────────────────────────── */
    .alert {
      padding:12px 16px;
      border-radius:10px;
      margin-bottom:20px;
      font-size:13px;
      display:none;
      align-items:flex-start;
      gap:10px;
    }
    .alert.show {
      display:flex;
    }
    .alert-error {
      background:rgba(239,68,68,.1);
      border:1px solid rgba(239,68,68,.25);
      color:#fca5a5;
    }
    .alert-success {
      background:rgba(16,185,129,.1);
      border:1px solid rgba(16,185,129,.25);
      color:#86efac;
    }
    .alert svg {
      width:18px;
      height:18px;
      flex-shrink:0;
      margin-top:1px;
    }

    @media(max-width:780px) {
      .nav a span { display:none; }
      .auth-card { padding:28px; }
    }
  </style>
</head>
<body>

<header class="hdr">
  <a class="logo" href="index.html">
    <img src="image/logo.png" alt="Livfy AI" class="logo-img" />
  </a>
  <nav class="nav">
    <a href="index.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      <span>Home</span>
    </a>
  </nav>
  <div class="hdr-right">
    <a href="signup.html" class="cta-btn" style="padding:8px 20px;border-radius:8px;background:var(--grad);color:#fff;text-decoration:none;font-size:13px;font-weight:700;">Sign Up</a>
  </div>
</header>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-sub">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>

    <div class="alert alert-error" id="errorAlert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      <span id="errorText">Invalid email or password</span>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-input" placeholder="Enter your email" required />
        <div class="error-msg" id="emailError">Please enter a valid email address</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Enter your password" required />
        <div class="error-msg" id="passwordError">Password is required</div>
      </div>

      <div class="form-options">
        <label class="remember">
          <input type="checkbox" id="remember" />
          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
        Sign In
      </button>
    </form>

    <div class="divider">or continue with</div>

    <button class="social-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google
    </button>
  </div>
</div>

<script type="module">
// Firebase Authentication
let firebaseConfig = null;
let app = null;
let auth = null;

// Fetch Firebase config from backend
async function initFirebase() {
  try {
    const response = await fetch('/api/firebase-config');
    firebaseConfig = await response.json();
    
    app = window.firebaseApp(firebaseConfig);
    auth = window.firebaseAuth(app);
    
    // Check if user is already logged in
    window.onAuthStateChanged(auth, (user) => {
      if (user) {
        // User is signed in, redirect to dashboard
        const token = user.getIdToken();
        token.then(idToken => {
          localStorage.setItem('token', idToken);
          localStorage.setItem('user', JSON.stringify({
            uid: user.uid,
            email: user.email,
            emailVerified: user.emailVerified,
            displayName: user.displayName
          }));
          window.location.href = 'indes.html';
        });
      }
    });
  } catch (error) {
    console.error('Firebase initialization error:', error);
    showError('Failed to initialize authentication. Please refresh the page.');
  }
}

const loginForm = document.getElementById('loginForm');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const submitBtn = document.getElementById('submitBtn');
const googleBtn = document.getElementById('googleBtn');
const errorAlert = document.getElementById('errorAlert');
const errorText = document.getElementById('errorText');
const emailError = document.getElementById('emailError');
const passwordError = document.getElementById('passwordError');

function validateEmail(email) {
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return re.test(email);
}

function showError(message) {
  errorText.textContent = message;
  errorAlert.classList.add('show');
}

function hideError() {
  errorAlert.classList.remove('show');
}

// Email/Password Login
loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();
  
  if (!auth) {
    showError('Authentication not initialized. Please refresh the page.');
    return;
  }
  
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  
  let isValid = true;
  
  if (!validateEmail(email)) {
    emailInput.classList.add('error');
    emailError.classList.add('show');
    isValid = false;
  } else {
    emailInput.classList.remove('error');
    emailError.classList.remove('show');
  }
  
  if (!password) {
    passwordInput.classList.add('error');
    passwordError.classList.add('show');
    isValid = false;
  } else {
    passwordInput.classList.remove('error');
    passwordError.classList.remove('show');
  }
  
  if (!isValid) return;
  
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spinner"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Signing in...';
  
  try {
    const userCredential = await window.signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;
    const token = await user.getIdToken();
    
    localStorage.setItem('token', token);
    localStorage.setItem('user', JSON.stringify({
      uid: user.uid,
      email: user.email,
      emailVerified: user.emailVerified,
      displayName: user.displayName
    }));
    
    window.location.href = 'indes.html';
  } catch (error) {
    console.error('Login error:', error);
    const errorCode = error.code;
    let errorMessage = 'Login failed. Please try again.';
    
    if (errorCode === 'auth/user-not-found') {
      errorMessage = 'No account found with this email.';
    } else if (errorCode === 'auth/wrong-password') {
      errorMessage = 'Incorrect password.';
    } else if (errorCode === 'auth/invalid-email') {
      errorMessage = 'Invalid email address.';
    } else if (errorCode === 'auth/too-many-requests') {
      errorMessage = 'Too many attempts. Please try again later.';
    }
    
    showError(errorMessage);
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg> Sign In';
  }
});

// Google Sign-In
googleBtn.addEventListener('click', async () => {
  hideError();
  
  if (!auth) {
    showError('Authentication not initialized. Please refresh the page.');
    return;
  }
  
  googleBtn.disabled = true;
  googleBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spinner"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Connecting...';
  
  try {
    const provider = new window.GoogleAuthProvider();
    const userCredential = await window.signInWithPopup(auth, provider);
    const user = userCredential.user;
    const token = await user.getIdToken();
    
    localStorage.setItem('token', token);
    localStorage.setItem('user', JSON.stringify({
      uid: user.uid,
      email: user.email,
      emailVerified: user.emailVerified,
      displayName: user.displayName,
      photoURL: user.photoURL
    }));
    
    window.location.href = 'indes.html';
  } catch (error) {
    console.error('Google sign-in error:', error);
    const errorCode = error.code;
    let errorMessage = 'Google sign-in failed. Please try again.';
    
    if (errorCode === 'auth/popup-closed-by-user') {
      errorMessage = 'Sign-in was cancelled.';
    } else if (errorCode === 'auth/popup-blocked') {
      errorMessage = 'Popup was blocked. Please allow popups for this site.';
    } else if (errorCode === 'auth/account-exists-with-different-credential') {
      errorMessage = 'An account already exists with the same email address but different sign-in credentials.';
    }
    
    showError(errorMessage);
    googleBtn.disabled = false;
    googleBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Google';
  }
});

emailInput.addEventListener('input', () => {
  emailInput.classList.remove('error');
  emailError.classList.remove('show');
});

passwordInput.addEventListener('input', () => {
  passwordInput.classList.remove('error');
  passwordError.classList.remove('show');
});

// Initialize Firebase on load
initFirebase();
</script>

</body>
</html>
