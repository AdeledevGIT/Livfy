<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Livfy — Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,450&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="https://adeledevgit.github.io/Livfy/webicon.png" />
<link rel="apple-touch-icon" href="https://adeledevgit.github.io/Livfy/webicon.png" />
<link rel="manifest" href="https://adeledevgit.github.io/Livfy/manifest.json" />
<meta name="theme-color" content="#05051a" />

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  
  window.firebaseApp = initializeApp;
  window.firebaseAuth = getAuth;
  window.onAuthStateChanged = onAuthStateChanged;
  window.signOut = signOut;
</script>
<style>

  /* ============================================================
     TOKENS - Dashboard color scheme
  ============================================================ */
  :root {
    --bg: #05051a;
    --bg-soft: #0a0a2e;
    --surface: rgba(255,255,255,.04);
    --surface-hi: rgba(255,255,255,.08);
    --line: rgba(255,255,255,.08);
    --line-hi: rgba(255,255,255,.14);

    --text: #f0f4ff;
    --text-dim: rgba(240,244,255,.62);
    --text-faint: rgba(240,244,255,.38);

    --pink: #ff2d6f;
    --violet: #c084fc;
    --cyan: #00c8ff;
    --pink-wash: rgba(255,45,111,.1);
    --violet-wash: rgba(192,132,252,.1);
    --cyan-wash: rgba(0,200,255,.1);

    --grad: linear-gradient(135deg,#ff2d6f,#c084fc 50%,#00c8ff);

    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 9px;

    --font-display: 'Fraunces', serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

    --nav-h: 68px;
    --tabbar-h: 64px;
  }

  * { box-sizing:border-box; margin:0; padding:0; }
  html { -webkit-text-size-adjust:100%; }
  body {
    background:var(--bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 15% 0%,rgba(255,45,111,.07) 0,transparent 60%),
      radial-gradient(ellipse 60% 45% at 85% 95%,rgba(0,200,255,.05) 0,transparent 60%);
    color:var(--text);
    font-family:var(--font-body);
    font-size:15px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  img,svg { display:block; }
  a { color:inherit; text-decoration:none; }
  button { font:inherit; color:inherit; background:none; border:none; cursor:pointer; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration:.001ms !important; transition-duration:.001ms !important; }
  }

  :focus-visible {
    outline:2px solid var(--pink);
    outline-offset:3px;
    border-radius:4px;
  }

  /* ============================================================
     TOP NAV (desktop)
  ============================================================ */
  .topnav {
    height:var(--nav-h);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 32px;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    background:rgba(5,5,26,.85);
    backdrop-filter:blur(14px);
    z-index:200;
  }
  .brand {
    display:flex;
    align-items:center;
    gap:10px;
    font-family:var(--font-display);
    font-size:19px;
    font-weight:500;
    letter-spacing:.01em;
  }
  .brand-mark {
    width:26px; height:26px;
    border-radius:8px;
    background:var(--grad);
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .brand-mark img {
    width:100%;
    height:100%;
    object-fit:contain;
    border-radius:8px;
  }
  .nav-links {
    display:flex;
    align-items:center;
    gap:6px;
  }
  .nav-links a {
    padding:8px 14px;
    border-radius:100px;
    font-size:13.5px;
    font-weight:500;
    color:var(--text-dim);
    transition:color .15s, background .15s;
  }
  .nav-links a:hover { color:var(--text); background:var(--surface); }
  .nav-links a.active { color:var(--text); background:var(--surface-hi); }

  .nav-right {
    display:flex;
    align-items:center;
    gap:10px;
  }

  /* balance pill */
  .balance-pill {
    position:relative;
  }
  .balance-pill button {
    display:flex;
    align-items:center;
    gap:7px;
    padding:7px 12px 7px 8px;
    border-radius:100px;
    background:var(--surface);
    border:1px solid var(--line);
    font-size:13px;
    font-weight:600;
    color:var(--text-dim);
    transition:border-color .15s, color .15s;
  }
  .balance-pill button:hover { border-color:var(--line-hi); color:var(--text); }
  .balance-pill .dot {
    width:16px; height:16px;
    border-radius:50%;
    background:var(--pink-wash);
    display:flex; align-items:center; justify-content:center;
  }
  .balance-pill .dot svg { width:9px; height:9px; stroke:var(--pink); }
  .balance-pill .chev { width:11px; height:11px; stroke:var(--text-faint); transition:transform .2s; }
  .balance-pill.open .chev { transform:rotate(180deg); }

  .balance-panel {
    position:absolute;
    top:calc(100% + 10px);
    right:0;
    width:250px;
    background:var(--surface);
    border:1px solid var(--line-hi);
    border-radius:var(--radius-md);
    padding:16px;
    box-shadow:0 20px 40px rgba(0,0,0,.35);
    opacity:0;
    visibility:hidden;
    transform:translateY(-6px);
    transition:opacity .16s, transform .16s, visibility .16s;
  }
  .balance-pill.open .balance-panel {
    opacity:1; visibility:visible; transform:translateY(0);
  }
  .balance-panel-label { font-size:11.5px; color:var(--text-faint); margin-bottom:3px; }
  .balance-panel-amount { font-size:24px; font-weight:700; margin-bottom:14px; }
  .balance-panel-amount span { font-size:13px; font-weight:500; color:var(--text-dim); }
  .balance-panel button.topup {
    width:100%;
    padding:10px;
    border-radius:var(--radius-sm);
    background:var(--grad);
    color:#fff;
    font-weight:600;
    font-size:13.5px;
    transition:background .15s;
  }
  .balance-panel button.topup:hover { background:linear-gradient(135deg,#c084fc,#00c8ff); }

  .avatar {
    width:34px; height:34px;
    border-radius:50%;
    background:var(--surface);
    border:1px solid var(--line-hi);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:border-color .15s;
  }
  .avatar:hover {
    border-color:var(--pink);
  }
  .avatar svg {
    width:18px; height:18px;
    stroke:var(--text-dim);
  }

  /* ============================================================
     MAIN
  ============================================================ */
  .main {
    max-width:960px;
    margin:0 auto;
    padding:44px 28px 64px;
  }

  /* ── Profile Header ─────────────────────────────────── */
  .profile-header {
    display:flex;
    align-items:center;
    gap:20px;
    padding:30px;
    border-radius:var(--radius-lg);
    background:var(--surface);
    border:1px solid var(--line);
    margin-bottom:24px;
  }
  .profile-avatar {
    width:80px; height:80px;
    border-radius:50%;
    background:var(--grad);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .profile-avatar svg {
    width:40px; height:40px;
    stroke:#fff;
  }
  .profile-info h1 {
    font-family:var(--font-display);
    font-size:28px;
    font-weight:500;
    margin-bottom:8px;
  }
  .profile-info p {
    color:var(--text-dim);
    font-size:14px;
  }

  /* ── Profile Sections ─────────────────────────────── */
  .profile-section {
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-lg);
    padding:24px;
    margin-bottom:20px;
  }
  .section-title {
    font-size:16px;
    font-weight:600;
    margin-bottom:16px;
    color:var(--text);
  }
  .field-group {
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .field {
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .field label {
    font-size:12px;
    font-weight:600;
    color:var(--text-faint);
    text-transform:uppercase;
    letter-spacing:.04em;
  }
  .field input {
    padding:12px 16px;
    border-radius:var(--radius-md);
    background:var(--bg-soft);
    border:1px solid var(--line);
    color:var(--text);
    font-family:inherit;
    font-size:14px;
    transition:border-color .2s;
  }
  .field input:focus {
    outline:none;
    border-color:var(--pink);
  }
  .field input:disabled {
    opacity:.5;
    cursor:not-allowed;
  }

  /* ── Stats Grid ─────────────────────────────────── */
  .stats-grid {
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:16px;
    margin-bottom:20px;
  }
  .stat-card {
    background:var(--bg-soft);
    border:1px solid var(--line);
    border-radius:var(--radius-md);
    padding:20px;
    text-align:center;
  }
  .stat-value {
    font-size:28px;
    font-weight:700;
    background:var(--grad);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:4px;
  }
  .stat-label {
    font-size:12px;
    color:var(--text-dim);
    font-weight:500;
  }

  /* ── Action Buttons ─────────────────────────────── */
  .action-btn {
    width:100%;
    padding:12px;
    border-radius:var(--radius-md);
    background:var(--grad);
    color:#fff;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:background .15s;
    margin-top:8px;
  }
  .action-btn:hover {
    background:linear-gradient(135deg,#c084fc,#00c8ff);
  }
  .action-btn.secondary {
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--text);
  }
  .action-btn.secondary:hover {
    background:var(--surface-hi);
  }

  /* ── TABBAR (mobile) ─────────────────────────────── */
  .tabbar { display:none; }

  /* ============================================================
     RESPONSIVE
  ============================================================ */
  @media (max-width:780px) {
    .nav-links { display:none; }
    .topnav { padding:0 16px; height:56px; }
    .brand span.wordmark { display:none; }
    .main { padding:24px 16px calc(var(--tabbar-h) + 28px); }
    .profile-header { flex-direction:column; text-align:center; }
    .stats-grid { grid-template-columns:1fr; }

    .tabbar {
      display:flex;
      position:fixed;
      left:0; right:0; bottom:0;
      height:var(--tabbar-h);
      padding-bottom:env(safe-area-inset-bottom);
      background:rgba(5,5,26,.92);
      backdrop-filter:blur(16px);
      border-top:1px solid var(--line);
      z-index:300;
    }
    .tabbar a {
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:3px;
      font-size:10.5px;
      font-weight:600;
      color:var(--text-faint);
    }
    .tabbar a svg { width:20px; height:20px; stroke-width:1.7; stroke:var(--text-faint); }
    .tabbar a.active { color:var(--pink); }
    .tabbar a.active svg { stroke:var(--pink); }
  }
</style>
</head>
<body>

<!-- ── TOP NAV ─────────────────────────────────────────────── -->
<nav class="topnav">
  <div class="brand">
    <div class="brand-mark">
      <img src="https://adeledevgit.github.io/Livfy/webicon.png" alt="Livfy" />
    </div>
    <span class="wordmark">Livfy</span>
  </div>

  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="generate.html">Generate</a>
    <a href="voice.html">Voice Clone</a>
    <a href="indes.html">Face Swap</a>
  </div>

  <div class="nav-right">
    <div class="balance-pill" id="balancePill">
      <button>
        <div class="dot">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle></svg>
        </div>
        <span id="tokenBalance">0</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </button>
      <div class="balance-panel">
        <div class="balance-panel-label">Available tokens</div>
        <div class="balance-panel-amount"><span id="panelTokenBalance">0</span> <span>tokens</span></div>
        <button class="topup">Top up</button>
      </div>
    </div>

    <div id="authSection" style="display:none;align-items:center;gap:10px;">
      <span id="userEmail" style="font-size:12px;color:var(--text-dim);"></span>
      <button id="logoutBtn" style="padding:6px 12px;border-radius:7px;border:1px solid var(--line);background:var(--surface);color:var(--text-dim);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;">Logout</button>
    </div>
    
    <a href="profile.html" class="avatar" style="background:var(--grad);border-color:var(--pink);">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </a>
  </div>
</nav>

<!-- ── MAIN ─────────────────────────────────────────────────── -->
<main class="main">
  <!-- ── Profile Header ───────────────────────────────────── -->
  <div class="profile-header">
    <div class="profile-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>
    <div class="profile-info">
      <h1>Profile</h1>
      <p>Manage your account settings and preferences</p>
    </div>
  </div>

  <!-- ── Stats ───────────────────────────────────────────── -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="totalGenerations">0</div>
      <div class="stat-label">Total Generations</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="tokensUsed">0</div>
      <div class="stat-label">Tokens Used</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="accountAge">0</div>
      <div class="stat-label">Days Active</div>
    </div>
  </div>

  <!-- ── Account Info ───────────────────────────────────── -->
  <div class="profile-section">
    <div class="section-title">Account Information</div>
    <div class="field-group">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="emailInput" disabled />
      </div>
      <div class="field">
        <label>Display Name</label>
        <input type="text" id="nameInput" placeholder="Enter your name" />
      </div>
    </div>
    <button class="action-btn" id="saveProfileBtn">Save Changes</button>
  </div>

  <!-- ── Account Actions ─────────────────────────────────── -->
  <div class="profile-section">
    <div class="section-title">Account Actions</div>
    <button class="action-btn secondary" id="logoutBtn">Logout</button>
  </div>
</main>

<!-- ── BOTTOM TAB BAR (mobile) ───────────────────────────────── -->
<nav class="tabbar">
  <a href="dashboard.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    <span>Home</span>
  </a>
  <a href="generate.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
    <span>Create</span>
  </a>
  <a href="voice.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg>
    <span>Voice</span>
  </a>
  <a href="profile.html" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    <span>Profile</span>
  </a>
</nav>

<script type="module">
  // Firebase configuration dynamic loading
  let app, auth;
  try {
    const response = await fetch('/api/firebase-config');
    if (!response.ok) {
      throw new Error(`Failed to fetch Firebase config: ${response.status}`);
    }
    const firebaseConfig = await response.json();
    app = window.firebaseApp(firebaseConfig);
    auth = window.firebaseAuth(app);
  } catch (error) {
    console.error('Firebase initialization error:', error);
    window.location.href = 'login.html';
  }

  // Local Storage Management
  const LocalStorage = {
    getTokenBalance() {
      return parseInt(localStorage.getItem('livfy_token_balance') || '100');
    },
    getUserData() {
      const data = localStorage.getItem('livfy_user') || localStorage.getItem('user');
      return data ? JSON.parse(data) : null;
    },
    getStats() {
      return {
        totalGenerations: parseInt(localStorage.getItem('livfy_total_generations') || '0'),
        tokensUsed: parseInt(localStorage.getItem('livfy_tokens_used') || '0'),
        accountCreated: localStorage.getItem('livfy_account_created') || null
      };
    },
    setUserData(userData) {
      localStorage.setItem('livfy_user', JSON.stringify(userData));
      localStorage.setItem('user', JSON.stringify(userData));
    }
  };

  // Auth State Management
  window.onAuthStateChanged(auth, (user) => {
    const authSection = document.getElementById('authSection');
    const userEmail = document.getElementById('userEmail');

    console.log('Auth state changed:', user ? 'User logged in' : 'No user');

    if (user) {
      authSection.style.display = 'flex';
      userEmail.textContent = user.email.substring(0, 5) + '...';
      
      // Update profile fields
      document.getElementById('emailInput').value = user.email;
      const userData = LocalStorage.getUserData();
      if (userData && userData.displayName) {
        document.getElementById('nameInput').value = userData.displayName;
      }
    } else {
      authSection.style.display = 'none';
      
      // Load from local storage as fallback
      const userData = LocalStorage.getUserData();
      if (userData) {
        authSection.style.display = 'flex';
        userEmail.textContent = userData.email.substring(0, 5) + '...';
        document.getElementById('emailInput').value = userData.email;
        if (userData.displayName) {
          document.getElementById('nameInput').value = userData.displayName;
        }
      } else {
        window.location.href = 'login.html';
      }
    }
    
    // Update token balance
    const balance = LocalStorage.getTokenBalance();
    document.getElementById('tokenBalance').textContent = balance;
    document.getElementById('panelTokenBalance').textContent = balance;
    
    // Update stats
    const stats = LocalStorage.getStats();
    document.getElementById('totalGenerations').textContent = stats.totalGenerations;
    document.getElementById('tokensUsed').textContent = stats.tokensUsed;
    
    if (stats.accountCreated) {
      const createdDate = new Date(stats.accountCreated);
      const today = new Date();
      const daysActive = Math.floor((today - createdDate) / (1000 * 60 * 60 * 24));
      document.getElementById('accountAge').textContent = daysActive;
    }
  });

  // Logout functionality
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      await window.signOut(auth);
    } catch (error) {
      console.error('Logout error:', error);
    }
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    localStorage.removeItem('livfy_user');
    window.location.href = 'login.html';
  });

  // Save profile changes
  document.getElementById('saveProfileBtn').addEventListener('click', () => {
    const displayName = document.getElementById('nameInput').value;
    const userData = LocalStorage.getUserData();
    if (userData) {
      userData.displayName = displayName;
      LocalStorage.setUserData(userData);
      alert('Profile saved successfully!');
    }
  });

  // Balance pill toggle
  const balancePill = document.getElementById('balancePill');
  balancePill.addEventListener('click', (e) => {
    e.stopPropagation();
    balancePill.classList.toggle('open');
  });

  document.addEventListener('click', () => {
    balancePill.classList.remove('open');
  });
</script>

</body>
</html>
